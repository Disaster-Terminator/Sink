name: Deploy Worker

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: sink-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build, deploy, and smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Verify the production smoke gate
        uses: DataDog/synthetics-ci-github-action@v4.0.0
        with:
          api-key: ${{ secrets.DD_API_KEY }}
          app-key: ${{ secrets.DD_APP_KEY }}
          public-ids: raa-7wr-pgf
          selective-rerun: false
          fail-on-critical-errors: true
          fail-on-missing-tests: true
          fail-on-timeout: true

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Worker
        env:
          NITRO_PRESET: cloudflare_module
        run: pnpm build

      - name: Capture the current production version
        id: previous
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          version_id="$(pnpm exec wrangler deployments status --json | jq -er '.versions[] | select(.percentage == 100) | .version_id' | head -n 1)"
          test -n "$version_id"
          echo "version_id=$version_id" >> "$GITHUB_OUTPUT"

      - name: Deploy Worker
        id: deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: pnpm exec wrangler deploy

      - name: Run production smoke
        id: smoke
        uses: DataDog/synthetics-ci-github-action@v4.0.0
        with:
          api-key: ${{ secrets.DD_API_KEY }}
          app-key: ${{ secrets.DD_APP_KEY }}
          public-ids: raa-7wr-pgf
          selective-rerun: false
          fail-on-critical-errors: true
          fail-on-missing-tests: true
          fail-on-timeout: true

      - name: Roll back a failed release
        id: rollback
        if: always() && steps.deploy.outcome == 'success' && steps.smoke.outcome == 'failure'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: >-
          pnpm exec wrangler rollback "${{ steps.previous.outputs.version_id }}"
          --yes --message "Automatic rollback after failed production smoke"

      - name: Verify rollback
        if: always() && steps.rollback.outcome == 'success'
        uses: DataDog/synthetics-ci-github-action@v4.0.0
        with:
          api-key: ${{ secrets.DD_API_KEY }}
          app-key: ${{ secrets.DD_APP_KEY }}
          public-ids: raa-7wr-pgf
          selective-rerun: false
          fail-on-critical-errors: true
          fail-on-missing-tests: true
          fail-on-timeout: true
