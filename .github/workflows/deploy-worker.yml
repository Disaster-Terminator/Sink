name: Deploy Worker

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: sink-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Build, deploy, and smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Worker
        run: pnpm build

      - name: Capture the current production version
        id: previous
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          version_id="$(pnpm exec wrangler deployments status --json | jq -er '.versions[] | select(.percentage == 100) | .version_id' | head -n 1)"
          test -n "$version_id"
          echo "version_id=$version_id" >> "$GITHUB_OUTPUT"

      - name: Deploy Worker
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          packageManager: pnpm
          command: deploy

      - name: Run production smoke
        id: smoke
        run: curl --fail --silent --show-error --retry 5 --retry-all-errors --max-time 15 https://s.raystorm.me/ > /dev/null

      - name: Roll back a failed release
        id: rollback
        if: always() && steps.deploy.outcome == 'success' && steps.smoke.outcome == 'failure'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: >-
          pnpm exec wrangler rollback "${{ steps.previous.outputs.version_id }}"
          --yes --message "Automatic rollback after failed production smoke"

      - name: Verify rollback
        if: always() && steps.rollback.outcome == 'success'
        run: curl --fail --silent --show-error --retry 5 --retry-all-errors --max-time 15 https://s.raystorm.me/ > /dev/null
